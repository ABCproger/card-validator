version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - gocritic
    - ineffassign
    - misspell

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: gen/
      linters:
        - all

formatters:
  enable:
    - gofmt
    - goimports
